<link rel="import" href="chrome://resources/cr_elements/md_select.css.html">

<style include="settings-shared md-select">
  .primary-title {
    font-weight: 700;
    padding-top: 1em;
    font-size: 1.05em;
  }

  .nested-section {
    margin-inline-start: 1.5em;
    margin-top: -0.5em;
  }

  .borderless {
    border: none;
  }

  .normalize-margin {
    margin: 0 -1.5em 1em;
  }

  .css-code-widget {
    margin: 10px 20px 10px 20px;
    width: -webkit-fill-available;
    font-family: Muli, sans-serif;
    padding: 10px;
    border-width: 1px;
    border-style: solid;
    border-color: var(--line-color);
    border-image: initial;
    border-radius: 6px;
  }

  .css-code-text {
    box-sizing: border-box;
    min-height: 140px;
    width: 100%;
    border-width: 1px;
    border-style: solid;
    border-color: var(--line-color);
    border-radius: 6px;
    padding: 15px 20px;
    font-family: inherit;
    font-size: 16px;
    line-height: 26px;
  }

  .css-code-footer {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto;
    align-items: center;
    /* check muli */
  }

  .clipboard-button {
    margin: 0;
    width: 24px;
    height: 24px;
  }

  .done-button {
    margin: 0;
    width: 80px;
    height: 26px;
  }

  .css-code-clipboard {
    display: grid;
    grid-template-columns: auto auto;
    grid-template-rows: auto;
    align-items: center;
    gap: 10px;
  }

  .clipboard-success {
    transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1);
    opacity: 0;
  }

  .clipboard-success.is-success-true {
    opacity: 1;
  }
</style>
<settings-section id="newTab" page-title="$i18n{catsxpNewTab}">
  <settings-toggle-button label="$i18n{tabCatsxpNewTab}" pref="{{prefs.catsxp.tabs.catsxp_new_tab}}">
  </settings-toggle-button>
  <template is="dom-if" if="[[prefs.catsxp.tabs.catsxp_new_tab.value]]">
    <div class="list-frame">
      <div class="settings-box first">
        <div class="flex cr-padded-text" aria-hidden="true">
          $i18n{catsxpNewTabNewTabPageShows}
        </div>
        <settings-dropdown-menu label="$i18n{catsxpNewTabNewTabPageShows}"
          pref="{{prefs.catsxp.new_tab_page.shows_options}}" menu-options="[[newTabShowOptions_]]">
        </settings-dropdown-menu>
      </div>
      <template is="dom-if" if="[[showNewTabDashboardSettings_]]">
        <div class="settings-row">
          <cr-link-row class="hr" label="$i18n{catsxpNewTabNewTabCustomizeWidgets}" on-click="openNewTabPage_" external>
          </cr-link-row>
        </div>
      </template>
    </div>
  </template>
  <settings-toggle-button label="$i18n{tabUseDefaultIcon}" pref="{{prefs.catsxp.new_tab_page.use_default_icon}}">
  </settings-toggle-button>
</settings-section>
